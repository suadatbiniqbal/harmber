<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Harmber</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #050505;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: #aaa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #111, #050505);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav {
      padding: 20px;
      font-weight: 600;
      font-size: 18px;
      opacity: 0.8;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin-top: 80px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: white;
      outline: none;
      margin-bottom: 12px;
    }

    input::placeholder {
      color: #666;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: white;
      color: black;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,255,255,0.15);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 480px) {
      .container {
        margin-top: 40px;
      }

      h1 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<div class="nav">Harmber</div>

<div class="container">
  <div class="card">

    <h1>Open YouTube in Harmber</h1>
    <p>Paste a YouTube link or video ID</p>

    <input id="input" placeholder="https://youtube.com/watch?v=..." />

    <button onclick="go()">Open</button>

  </div>

  <div class="footer">
    Built for fast music access ⚡
  </div>
</div>

<script>
function extractId(url) {
  try {
    // full URL
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
      const u = new URL(url);

      // normal
      if (u.searchParams.get("v")) {
        return u.searchParams.get("v");
      }

      // youtu.be
      return u.pathname.split("/")[1];
    }

    // assume direct ID
    return url.trim();

  } catch {
    return url.trim();
  }
}

function go() {
  const val = document.getElementById("input").value.trim();
  if (!val) return;

  const id = extractId(val);

  if (!id || id.length < 6) {
    alert("Invalid YouTube link or ID");
    return;
  }

  window.location.href = `/watch.html?v=${id}`;
}
</script>

</body>
</html>
