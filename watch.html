<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Server should inject title here -->
  <title>Video Title — Harmber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://googleapis.com" rel="stylesheet"/>
  <link rel="stylesheet" href="watch.css"/>
</head>
<body>

<header class="nav">
  <div class="logo">Harmber</div>
</header>

<!-- 
  SERVER-SIDE RENDER NOTE: 
  Populate these IDs/Srcs on the server to avoid the "Skeleton" flicker.
-->
<main class="watch-main">
  <div class="watch-card" id="card">
    <div class="thumb-wrap" id="thumbWrap">
      <img id="thumb" src="https://youtube.com" alt="Thumbnail"/>
      <div class="overlay"></div>
      <div class="play-btn" id="playBtn">▶</div>
    </div>

    <div class="watch-meta">
      <h1 id="title" class="title">Video Title Loading...</h1>
      <p id="channel" class="channel">Channel Name</p>
      <div class="stats">
        <span id="views">0 views</span> • <span id="date">Date</span>
      </div>
      <p id="desc" class="desc">Description goes here...</p>
    </div>

    <div class="watch-cta">
      <!-- This button now triggers the Android Native Chooser/Share Sheet -->
      <button id="openBtn" class="btn-primary">Open or Share</button>
      <p class="hint">Tap to choose an app or copy link</p>
    </div>
  </div>
</main>

<script>
  // 1. Get Video ID from URL
  const params = new URLSearchParams(location.search);
  const videoId = params.get('v')?.split('&')[0];
  
  if (!videoId) location.href = '/';

  const videoUrl = `https://youtube.com{videoId}`;
  const shareTitle = document.title;

  // 2. THE FEATURE: Native Android Chooser (Web Share API)
  // This shows the "Copy" button + App list exactly like Android Share
  async function openNativeChooser() {
    if (navigator.share) {
      try {
        await navigator.share({
          title: shareTitle,
          text: 'Watch this on Harmber',
          url: videoUrl 
        });
      } catch (err) {
        console.log('User cancelled or error:', err);
        // Fallback if they close the sheet without picking
      }
    } else {
      // FALLBACK for Desktop or old browsers
      window.open(videoUrl, '_blank');
    }
  }

  // 3. Attach Events
  document.getElementById('openBtn').addEventListener('click', openNativeChooser);
  document.getElementById('thumbWrap').addEventListener('click', openNativeChooser);

  // 4. (Optional) Client-side Data Fetch 
  // If you don't have a backend server (Node/PHP), keep this. 
  // If you DO have a backend, delete this and print values in HTML above.
  async function loadMetadata() {
    const KEY = 'YOUR_API_KEY'; 
    try {
      const res = await fetch(`https://googleapis.com{videoId}&key=${KEY}`);
      const data = await res.json();
      if (data.items?.[0]) {
        const v = data.items[0];
        document.getElementById('title').textContent = v.snippet.title;
        document.getElementById('channel').textContent = v.snippet.channelTitle;
        document.getElementById('views').textContent = Number(v.statistics.viewCount).toLocaleString() + ' views';
        document.getElementById('thumb').src = v.snippet.thumbnails.high.url;
        document.getElementById('desc').textContent = v.snippet.description.slice(0, 150) + '...';
      }
    } catch (e) { console.error(e); }
  }

  loadMetadata();
</script>

</body>
</html>
