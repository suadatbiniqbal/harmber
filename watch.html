<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Loading… — Harmber</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="watch.css"/>
</head>
<body>

<header class="nav">
  <div class="logo">Harmber</div>
</header>

<main class="watch-main">

  <div class="watch-card" id="card">

    <!-- PLAYER -->
    <div class="video-wrap">
      <iframe id="player" allowfullscreen></iframe>
    </div>

    <!-- META -->
    <div class="watch-meta">
      <h1 id="title" class="title">Loading...</h1>
      <p id="channel" class="channel"></p>

      <div class="stats">
        <span id="views"></span>
        <span id="date"></span>
      </div>

      <p id="desc" class="desc"></p>
    </div>

    <!-- CTA -->
    <div class="watch-cta">
      <button id="openBtn" class="btn-white">Open in Harmber</button>
      <p class="hint">Better experience in app</p>
    </div>

  </div>

</main>

<!-- FALLBACK -->
<div id="fallback" class="fallback">
  <div class="fallback-box">
    <h3>App not installed</h3>
    <p>Download Harmber to continue</p>
    <a href="/#download" class="btn-white">Download</a>
  </div>
</div>

<script>
const KEY = 'AIzaSyBXZxLTFUmiFRliRRcEuV1Baxmzq8JiZ_0';

const params = new URLSearchParams(location.search);
const raw = params.get('v') || '';
const id = raw.split('&')[0];

if (!id) location.href = '/';

// player
player.src = `https://www.youtube.com/embed/${id}`;

// fetch data
async function load() {
  try {
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=${KEY}`
    );
    const data = await res.json();

    const v = data.items[0];
    const s = v.snippet;
    const stats = v.statistics;

    title.textContent = s.title;
    channel.textContent = s.channelTitle;

    views.textContent = `${Number(stats.viewCount).toLocaleString()} views`;
    date.textContent = new Date(s.publishedAt).toDateString();

    desc.textContent = s.description.slice(0, 200) + "...";

    document.title = s.title + " — Harmber";

  } catch (e) {
    console.error(e);
  }
}

load();

// intent
openBtn.onclick = () => {
  const intent =
    `intent://watch?v=${id}#Intent;scheme=https;package=com.harmber.suadat;end;`;

  const t = Date.now();
  location.href = intent;

  setTimeout(() => {
    if (Date.now() - t < 2500) {
      fallback.classList.add("visible");
      card.classList.add("dim");
    }
  }, 2000);
};
</script>

</body>
</html>
